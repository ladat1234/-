<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>באנר</title>
    <style>
        /* איפוס שוליים מוחלט */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden;
            background: transparent;
        }
        .banner-container {
            width: 100%;
            margin: 0;
            padding: 0;
            display: block;
        }
        /* הגדרת הקישור כבלוק כדי שלא ייצר שוליים */
        .banner-container a {
            display: block;
            margin: 0;
            padding: 0;
            text-decoration: none;
        }
        .banner-container img {
            width: 100%;
            display: block;
            margin: 0;
            padding: 0;
            /* שמירה על חדות מקסימלית של התמונה המקורית */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <a href="https://ydaat-books.coi.co.il/" target="_top">
            <img src="banner.jpg" alt="באנר - חזרה לדף הבית">
        </a>
    </div>

</body>
</html>
